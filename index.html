<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .gantt-bar {
            transition: all 0.3s ease;
        }
        .gantt-bar:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { PieChart, Pie, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell } = Recharts;

        // Sample data
        const TEAM_MEMBERS = [
            { id: 1, name: 'Sarah Chen', initials: 'SC', color: 'bg-blue-500' },
            { id: 2, name: 'Alex Kim', initials: 'AK', color: 'bg-indigo-500' },
            { id: 3, name: 'Mike Johnson', initials: 'MJ', color: 'bg-purple-500' },
            { id: 4, name: 'Emily Davis', initials: 'ED', color: 'bg-pink-500' }
        ];

        const INITIAL_TASKS = [
            { id: 1, title: 'Design homepage mockup', status: 'Done', priority: 'High', assignee: 'Sarah Chen', dueDate: '2026-03-25', tags: ['Design', 'UI'], description: 'Create mockup for homepage redesign', subtasks: [{ id: 1, title: 'Wireframe layout', done: true }, { id: 2, title: 'Design system', done: true }] },
            { id: 2, title: 'Implement responsive nav', status: 'In Progress', priority: 'High', assignee: 'Alex Kim', dueDate: '2026-03-28', tags: ['Frontend', 'React'], description: 'Build responsive navigation component' },
            { id: 3, title: 'Set up CI/CD pipeline', status: 'To Do', priority: 'Medium', assignee: 'Mike Johnson', dueDate: '2026-04-05', tags: ['DevOps', 'Infrastructure'], description: 'Configure automated deployment pipeline' },
            { id: 4, title: 'Write API documentation', status: 'Review', priority: 'Low', assignee: 'Emily Davis', dueDate: '2026-03-30', tags: ['Documentation'], description: 'Document all API endpoints and schemas' },
            { id: 5, title: 'Database schema design', status: 'Done', priority: 'Critical', assignee: 'Alex Kim', dueDate: '2026-03-20', tags: ['Database', 'Backend'], description: 'Design and optimize database schema' },
            { id: 6, title: 'User authentication flow', status: 'In Progress', priority: 'High', assignee: 'Sarah Chen', dueDate: '2026-04-02', tags: ['Security', 'Auth'], description: 'Implement OAuth and JWT authentication' },
            { id: 7, title: 'Performance optimization', status: 'To Do', priority: 'Medium', assignee: 'Mike Johnson', dueDate: '2026-04-10', tags: ['Performance'], description: 'Optimize code and assets for speed' },
            { id: 8, title: 'Mobile responsive testing', status: 'To Do', priority: 'High', assignee: 'Emily Davis', dueDate: '2026-04-08', tags: ['Testing', 'QA'], description: 'Test all pages on mobile devices' },
            { id: 9, title: 'SEO optimization', status: 'Review', priority: 'Medium', assignee: 'Sarah Chen', dueDate: '2026-04-12', tags: ['SEO', 'Marketing'], description: 'Optimize for search engines' },
            { id: 10, title: 'Payment integration', status: 'In Progress', priority: 'Critical', assignee: 'Alex Kim', dueDate: '2026-04-15', tags: ['Payment', 'Integration'], description: 'Integrate Stripe payment gateway' },
            { id: 11, title: 'Email notification system', status: 'To Do', priority: 'Medium', assignee: 'Mike Johnson', dueDate: '2026-04-20', tags: ['Backend', 'Email'], description: 'Set up automated email notifications' },
            { id: 12, title: 'Analytics dashboard', status: 'To Do', priority: 'Low', assignee: 'Emily Davis', dueDate: '2026-05-01', tags: ['Analytics', 'Dashboard'], description: 'Create user analytics dashboard' },
            { id: 13, title: 'Content management system', status: 'Review', priority: 'High', assignee: 'Sarah Chen', dueDate: '2026-04-25', tags: ['CMS', 'Backend'], description: 'Build content management interface' }
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
                board: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
                list: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>,
                timeline: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 17"/><polyline points="17 6 23 6 23 12"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                arrow_right: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
                arrow_left: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
                menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-gray-400 text-sm mb-1">{title}</p>
                        <p className="text-3xl font-bold text-white">{value}</p>
                    </div>
                    <div className={`${color} p-3 rounded-lg`}>{icon}</div>
                </div>
            </div>
        );

        const TaskCard = ({ task, onTaskClick, moveTask }) => {
            const assignee = TEAM_MEMBERS.find(m => m.name === task.assignee);
            const priorityColor = {
                Critical: 'bg-red-500',
                High: 'bg-orange-500',
                Medium: 'bg-yellow-500',
                Low: 'bg-green-500'
            }[task.priority];

            const statusColor = {
                'To Do': 'bg-slate-600',
                'In Progress': 'bg-blue-600',
                'Review': 'bg-purple-600',
                'Done': 'bg-green-600'
            }[task.status];

            return (
                <div className="bg-slate-700 rounded-lg p-4 border border-slate-600 hover:border-slate-500 transition cursor-pointer" onClick={() => onTaskClick(task)}>
                    <h3 className="font-semibold text-white mb-2 line-clamp-2 hover:text-blue-400">{task.title}</h3>
                    <div className="flex gap-2 mb-3 flex-wrap">
                        {task.tags && task.tags.map(tag => (
                            <span key={tag} className="text-xs bg-slate-600 text-gray-200 px-2 py-1 rounded">{tag}</span>
                        ))}
                    </div>
                    <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                            <div className={`w-6 h-6 rounded-full ${assignee?.color} flex items-center justify-center text-xs font-bold text-white`}>
                                {assignee?.initials}
                            </div>
                            <span className="text-xs text-gray-400">{task.dueDate}</span>
                        </div>
                        <div className={`${priorityColor} text-xs font-semibold px-2 py-1 rounded text-white`}>
                            {task.priority}
                        </div>
                    </div>
                    <div className="flex gap-1 justify-between">
                        <button className="text-xs bg-slate-600 hover:bg-slate-500 px-2 py-1 rounded" onClick={(e) => { e.stopPropagation(); moveTask(task.id, -1); }}>
                            <Icon name="arrow_left" size={14} />
                        </button>
                        <button className="text-xs bg-slate-600 hover:bg-slate-500 px-2 py-1 rounded" onClick={(e) => { e.stopPropagation(); moveTask(task.id, 1); }}>
                            <Icon name="arrow_right" size={14} />
                        </button>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ tasks, onTaskClick }) => {
            const stats = {
                total: tasks.length,
                inProgress: tasks.filter(t => t.status === 'In Progress').length,
                completed: tasks.filter(t => t.status === 'Done').length,
                overdue: tasks.filter(t => new Date(t.dueDate) < new Date() && t.status !== 'Done').length
            };

            const statusData = [
                { name: 'To Do', value: tasks.filter(t => t.status === 'To Do').length, fill: '#475569' },
                { name: 'In Progress', value: tasks.filter(t => t.status === 'In Progress').length, fill: '#3b82f6' },
                { name: 'Review', value: tasks.filter(t => t.status === 'Review').length, fill: '#a855f7' },
                { name: 'Done', value: tasks.filter(t => t.status === 'Done').length, fill: '#22c55e' }
            ];

            const priorityData = [
                { name: 'Critical', value: tasks.filter(t => t.priority === 'Critical').length },
                { name: 'High', value: tasks.filter(t => t.priority === 'High').length },
                { name: 'Medium', value: tasks.filter(t => t.priority === 'Medium').length },
                { name: 'Low', value: tasks.filter(t => t.priority === 'Low').length }
            ];

            const recentTasks = tasks.slice(0, 5);
            const upcomingTasks = [...tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).slice(0, 5);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-4 gap-4">
                        <StatCard title="Total Tasks" value={stats.total} icon={<Icon name="menu" size={20} />} color="bg-blue-500" />
                        <StatCard title="In Progress" value={stats.inProgress} icon={<Icon name="timeline" size={20} />} color="bg-indigo-500" />
                        <StatCard title="Completed" value={stats.completed} icon={<Icon name="check" size={20} />} color="bg-green-500" />
                        <StatCard title="Overdue" value={stats.overdue} icon={<Icon name="x" size={20} />} color="bg-red-500" />
                    </div>

                    <div className="grid grid-cols-2 gap-6">
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h3 className="text-lg font-semibold text-white mb-4">Task Distribution</h3>
                            <ResponsiveContainer width="100%" height={250}>
                                <PieChart>
                                    <Pie data={statusData} cx="50%" cy="50%" labelLine={false} label={({ name, value }) => `${name}: ${value}`} outerRadius={80} fill="#8884d8" dataKey="value">
                                        {statusData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={entry.fill} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h3 className="text-lg font-semibold text-white mb-4">Tasks by Priority</h3>
                            <ResponsiveContainer width="100%" height={250}>
                                <BarChart data={priorityData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#475569" />
                                    <XAxis dataKey="name" stroke="#9ca3af" />
                                    <YAxis stroke="#9ca3af" />
                                    <Tooltip contentStyle={{ backgroundColor: '#1e293b', border: '1px solid #475569' }} cursor={{ fill: 'rgba(59, 130, 246, 0.1)' }} />
                                    <Bar dataKey="value" fill="#3b82f6" radius={[8, 8, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-6">
                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h3 className="text-lg font-semibold text-white mb-4">Recent Activity</h3>
                            <div className="space-y-3 max-h-64 overflow-y-auto scrollbar-hide">
                                {recentTasks.map(task => (
                                    <div key={task.id} className="p-3 bg-slate-700 rounded cursor-pointer hover:bg-slate-600 transition" onClick={() => onTaskClick(task)}>
                                        <p className="text-white font-medium text-sm">{task.title}</p>
                                        <p className="text-gray-400 text-xs">{task.assignee} • {task.status}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                            <h3 className="text-lg font-semibold text-white mb-4">Upcoming Deadlines</h3>
                            <div className="space-y-3 max-h-64 overflow-y-auto scrollbar-hide">
                                {upcomingTasks.map(task => (
                                    <div key={task.id} className="p-3 bg-slate-700 rounded cursor-pointer hover:bg-slate-600 transition" onClick={() => onTaskClick(task)}>
                                        <p className="text-white font-medium text-sm">{task.title}</p>
                                        <p className="text-gray-400 text-xs">{task.dueDate} • {task.assignee}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const KanbanView = ({ tasks, moveTask, onTaskClick }) => {
            const columns = ['To Do', 'In Progress', 'Review', 'Done'];
            const tasksByStatus = columns.map(status => tasks.filter(t => t.status === status));

            return (
                <div className="flex gap-4 overflow-x-auto pb-4">
                    {columns.map((column, idx) => (
                        <div key={column} className="flex-1 min-w-[350px] bg-slate-800 rounded-lg p-4 border border-slate-700">
                            <h2 className="text-lg font-semibold text-white mb-4">{column} ({tasksByStatus[idx].length})</h2>
                            <div className="space-y-3 max-h-[calc(100vh-200px)] overflow-y-auto scrollbar-hide">
                                {tasksByStatus[idx].map(task => (
                                    <TaskCard key={task.id} task={task} onTaskClick={onTaskClick} moveTask={moveTask} />
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ListView = ({ tasks, onTaskClick, onTasksChange }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('All');
            const [priorityFilter, setPriorityFilter] = useState('All');
            const [sortBy, setSortBy] = useState('dueDate');

            const filtered = tasks.filter(t =>
                t.title.toLowerCase().includes(searchTerm.toLowerCase()) &&
                (statusFilter === 'All' || t.status === statusFilter) &&
                (priorityFilter === 'All' || t.priority === priorityFilter)
            ).sort((a, b) => {
                if (sortBy === 'dueDate') return new Date(a.dueDate) - new Date(b.dueDate);
                if (sortBy === 'title') return a.title.localeCompare(b.title);
                if (sortBy === 'priority') {
                    const priorityOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                }
                return 0;
            });

            const handleDelete = (id) => {
                onTasksChange(tasks.filter(t => t.id !== id));
            };

            const handleToggleSubtask = (taskId, subtaskId) => {
                const updatedTasks = tasks.map(t => {
                    if (t.id === taskId && t.subtasks) {
                        return {
                            ...t,
                            subtasks: t.subtasks.map(st => st.id === subtaskId ? { ...st, done: !st.done } : st)
                        };
                    }
                    return t;
                });
                onTasksChange(updatedTasks);
            };

            const priorityBgColor = (priority) => {
                const colors = { Critical: 'bg-red-500', High: 'bg-orange-500', Medium: 'bg-yellow-500', Low: 'bg-green-500' };
                return colors[priority];
            };

            const statusBgColor = (status) => {
                const colors = { 'To Do': 'bg-slate-600', 'In Progress': 'bg-blue-600', 'Review': 'bg-purple-600', 'Done': 'bg-green-600' };
                return colors[status];
            };

            return (
                <div className="space-y-4">
                    <div className="flex gap-4 flex-wrap">
                        <div className="flex-1 min-w-64 relative">
                            <Icon name="search" size={18} className="absolute left-3 top-3 text-gray-400" />
                            <input
                                type="text"
                                placeholder="Search tasks..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                            />
                        </div>
                        <select
                            value={statusFilter}
                            onChange={(e) => setStatusFilter(e.target.value)}
                            className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500"
                        >
                            <option>All Status</option>
                            <option>To Do</option>
                            <option>In Progress</option>
                            <option>Review</option>
                            <option>Done</option>
                        </select>
                        <select
                            value={priorityFilter}
                            onChange={(e) => setPriorityFilter(e.target.value)}
                            className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500"
                        >
                            <option>All Priority</option>
                            <option>Critical</option>
                            <option>High</option>
                            <option>Medium</option>
                            <option>Low</option>
                        </select>
                        <select
                            value={sortBy}
                            onChange={(e) => setSortBy(e.target.value)}
                            className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500"
                        >
                            <option value="dueDate">Sort by Due Date</option>
                            <option value="title">Sort by Title</option>
                            <option value="priority">Sort by Priority</option>
                        </select>
                    </div>

                    <div className="bg-slate-800 rounded-lg border border-slate-700 overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-slate-700 border-b border-slate-600">
                                <tr>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Title</th>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Status</th>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Priority</th>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Assignee</th>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Due Date</th>
                                    <th className="px-4 py-3 text-left text-gray-300 font-semibold">Action</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-700">
                                {filtered.map(task => {
                                    const assignee = TEAM_MEMBERS.find(m => m.name === task.assignee);
                                    return (
                                        <tr key={task.id} className="hover:bg-slate-700 transition">
                                            <td className="px-4 py-3 text-white cursor-pointer hover:text-blue-400" onClick={() => onTaskClick(task)}>{task.title}</td>
                                            <td className="px-4 py-3"><span className={`${statusBgColor(task.status)} text-white text-xs font-semibold px-2 py-1 rounded`}>{task.status}</span></td>
                                            <td className="px-4 py-3"><span className={`${priorityBgColor(task.priority)} text-white text-xs font-semibold px-2 py-1 rounded`}>{task.priority}</span></td>
                                            <td className="px-4 py-3">
                                                <div className="flex items-center gap-2">
                                                    <div className={`w-6 h-6 rounded-full ${assignee?.color} flex items-center justify-center text-xs font-bold text-white`}>
                                                        {assignee?.initials}
                                                    </div>
                                                    <span className="text-gray-300">{task.assignee}</span>
                                                </div>
                                            </td>
                                            <td className="px-4 py-3 text-gray-300">{task.dueDate}</td>
                                            <td className="px-4 py-3">
                                                <button onClick={() => handleDelete(task.id)} className="text-red-400 hover:text-red-300">
                                                    <Icon name="trash" size={16} />
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const TimelineView = ({ tasks }) => {
            const startDate = new Date(2026, 2, 1); // March 1
            const endDate = new Date(2026, 4, 31); // May 31
            const today = new Date(2026, 2, 23);

            const getDayOffset = (date) => {
                const d = new Date(date);
                return Math.floor((d - startDate) / (1000 * 60 * 60 * 24));
            };

            const getTaskWidth = (task) => {
                const startDay = getDayOffsset(task.dueDate);
                return Math.max(30, startDay * 2);
            };

            const statusColor = {
                'To Do': 'bg-slate-600',
                'In Progress': 'bg-blue-600',
                'Review': 'bg-purple-600',
                'Done': 'bg-green-600'
            };

            const dayWidth = 2;
            const totalDays = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24));
            const todayOffset = getDayOffsset(today);

            return (
                <div className="bg-slate-800 rounded-lg p-6 border border-slate-700 overflow-x-auto">
                    <div className="flex gap-8">
                        <div className="min-w-48">
                            <h3 className="font-semibold text-white mb-4">Task Name</h3>
                            <div className="space-y-2">
                                {tasks.map(task => (
                                    <div key={task.id} className="h-10 flex items-center text-sm text-white truncate" title={task.title}>
                                        {task.title}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="relative" style={{ width: `${totalDays * dayWidth}px` }}>
                            <div className="absolute top-0 bottom-0 left-0 right-0 flex">
                                {Array.from({ length: totalDays }).map((_, i) => (
                                    <div key={i} className="border-l border-slate-700 flex-1" style={{ width: `${dayWidth}px` }}/>
                                ))}
                            </div>

                            <div className="absolute left-0 top-0 w-0.5 h-full bg-red-500 z-10" style={{ left: `${todayOffset * dayWidth}px` }} title="Today">
                                <div className="absolute -top-6 left-0 text-xs text-red-500 font-semibold transform -translate-x-1/2">Today</div>
                            </div>

                            <div className="space-y-2 relative z-20">
                                {tasks.map(task => {
                                    const taskStart = getDayOffsset(task.dueDate) - 7;
                                    const taskDuration = Math.max(5, getDayOffsset(task.dueDate) - taskStart);
                                    return (
                                        <div key={task.id} className="h-10 flex items-center">
                                            <div
                                                className={`${statusColor[task.status]} rounded px-3 py-1 text-white text-xs font-semibold gantt-bar whitespace-nowrap overflow-hidden text-ellipsis`}
                                                style={{ width: `${taskDuration * dayWidth}px`, marginLeft: `${Math.max(0, taskStart * dayWidth)}px` }}
                                                title={task.title}
                                            >
                                                {task.title}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TaskModal = ({ task, onClose, onSave, onStatusChange, onPriorityChange, onSubtaskToggle }) => {
            const [comments, setComments] = useState(task.comments || []);
            const [newComment, setNewComment] = useState('');

            const handleAddComment = () => {
                if (newComment.trim()) {
                    setComments([...comments, { id: Date.now(), text: newComment, author: 'You', timestamp: new Date().toLocaleDateString() }]);
                    setNewComment('');
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-800 rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto border border-slate-700">
                        <div className="flex justify-between items-center p-6 border-b border-slate-700 sticky top-0 bg-slate-800">
                            <h2 className="text-2xl font-bold text-white">{task.title}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white">
                                <Icon name="x" size={24} />
                            </button>
                        </div>

                        <div className="p-6 space-y-6">
                            <div>
                                <h3 className="text-sm font-semibold text-gray-300 mb-2">Description</h3>
                                <p className="text-gray-300">{task.description}</p>
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Status</label>
                                    <select
                                        value={task.status}
                                        onChange={(e) => onStatusChange(task.id, e.target.value)}
                                        className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    >
                                        <option>To Do</option>
                                        <option>In Progress</option>
                                        <option>Review</option>
                                        <option>Done</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Priority</label>
                                    <select
                                        value={task.priority}
                                        onChange={(e) => onPriorityChange(task.id, e.target.value)}
                                        className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    >
                                        <option>Critical</option>
                                        <option>High</option>
                                        <option>Medium</option>
                                        <option>Low</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Assignee</label>
                                    <input type="text" value={task.assignee} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none" disabled />
                                </div>
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-gray-300 block mb-2">Due Date</label>
                                <input type="date" value={task.dueDate} className="px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none" disabled />
                            </div>

                            {task.subtasks && task.subtasks.length > 0 && (
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-300 mb-3">Subtasks</h3>
                                    <div className="space-y-2">
                                        {task.subtasks.map(subtask => (
                                            <label key={subtask.id} className="flex items-center gap-3 cursor-pointer p-2 hover:bg-slate-700 rounded transition">
                                                <input
                                                    type="checkbox"
                                                    checked={subtask.done}
                                                    onChange={() => onSubtaskToggle(task.id, subtask.id)}
                                                    className="w-4 h-4 accent-blue-500"
                                                />
                                                <span className={`${subtask.done ? 'line-through text-gray-500' : 'text-gray-300'}`}>{subtask.title}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div>
                                <h3 className="text-sm font-semibold text-gray-300 mb-3">Comments</h3>
                                <div className="space-y-3 mb-4 max-h-48 overflow-y-auto">
                                    {comments.map(comment => (
                                        <div key={comment.id} className="bg-slate-700 rounded p-3">
                                            <p className="text-white font-semibold text-sm">{comment.author}</p>
                                            <p className="text-gray-300 text-sm mt-1">{comment.text}</p>
                                            <p className="text-gray-500 text-xs mt-2">{comment.timestamp}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <input
                                        type="text"
                                        placeholder="Add a comment..."
                                        value={newComment}
                                        onChange={(e) => setNewComment(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleAddComment()}
                                        className="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                    />
                                    <button onClick={handleAddComment} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-semibold transition">
                                        Post
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CreateTaskModal = ({ onClose, onCreateTask }) => {
            const [formData, setFormData] = useState({
                title: '',
                description: '',
                status: 'To Do',
                priority: 'Medium',
                assignee: 'Sarah Chen',
                dueDate: new Date().toISOString().split('T')[0],
                tags: ''
            });

            const handleSubmit = () => {
                if (formData.title.trim()) {
                    const newTask = {
                        id: Date.now(),
                        ...formData,
                        tags: formData.tags.split(',').map(t => t.trim()).filter(t => t)
                    };
                    onCreateTask(newTask);
                    onClose();
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-800 rounded-lg w-full max-w-xl border border-slate-700">
                        <div className="flex justify-between items-center p-6 border-b border-slate-700">
                            <h2 className="text-2xl font-bold text-white">Create New Task</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white">
                                <Icon name="x" size={24} />
                            </button>
                        </div>

                        <div className="p-6 space-y-4">
                            <div>
                                <label className="text-sm font-semibold text-gray-300 block mb-2">Title</label>
                                <input
                                    type="text"
                                    value={formData.title}
                                    onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                    placeholder="Enter task title..."
                                />
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-gray-300 block mb-2">Description</label>
                                <textarea
                                    value={formData.description}
                                    onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                    placeholder="Enter task description..."
                                    rows="3"
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Status</label>
                                    <select
                                        value={formData.status}
                                        onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                        className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    >
                                        <option>To Do</option>
                                        <option>In Progress</option>
                                        <option>Review</option>
                                        <option>Done</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Priority</label>
                                    <select
                                        value={formData.priority}
                                        onChange={(e) => setFormData({ ...formData, priority: e.target.value })}
                                        className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    >
                                        <option>Critical</option>
                                        <option>High</option>
                                        <option>Medium</option>
                                        <option>Low</option>
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Assignee</label>
                                    <select
                                        value={formData.assignee}
                                        onChange={(e) => setFormData({ ...formData, assignee: e.target.value })}
                                        className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    >
                                        {TEAM_MEMBERS.map(member => (
                                            <option key={member.id}>{member.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-gray-300 block mb-2">Due Date</label>
                                    <input
                                        type="date"
                                        value={formData.dueDate}
                                        onChange={(e) => setFormData({ ...formData, dueDate: e.target.value })}
                                        className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:border-blue-500"
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-gray-300 block mb-2">Tags (comma-separated)</label>
                                <input
                                    type="text"
                                    value={formData.tags}
                                    onChange={(e) => setFormData({ ...formData, tags: e.target.value })}
                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                    placeholder="e.g., Design, Frontend, Bug"
                                />
                            </div>

                            <div className="flex gap-3 pt-4">
                                <button onClick={handleSubmit} className="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-semibold transition">
                                    Create Task
                                </button>
                                <button onClick={onClose} className="flex-1 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded font-semibold transition">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedTask, setSelectedTask] = useState(null);
            const [showCreateModal, setShowCreateModal] = useState(false);

            const moveTask = (taskId, direction) => {
                const columns = ['To Do', 'In Progress', 'Review', 'Done'];
                const task = tasks.find(t => t.id === taskId);
                if (!task) return;

                const currentIdx = columns.indexOf(task.status);
                const newIdx = currentIdx + direction;

                if (newIdx >= 0 && newIdx < columns.length) {
                    setTasks(tasks.map(t =>
                        t.id === taskId ? { ...t, status: columns[newIdx] } : t
                    ));
                }
            };

            const handleStatusChange = (taskId, newStatus) => {
                setTasks(tasks.map(t =>
                    t.id === taskId ? { ...t, status: newStatus } : t
                ));
                setSelectedTask(prev => prev ? { ...prev, status: newStatus } : null);
            };

            const handlePriorityChange = (taskId, newPriority) => {
                setTasks(tasks.map(t =>
                    t.id === taskId ? { ...t, priority: newPriority } : t
                ));
                setSelectedTask(prev => prev ? { ...prev, priority: newPriority } : null);
            };

            const handleSubtaskToggle = (taskId, subtaskId) => {
                const updatedTasks = tasks.map(t => {
                    if (t.id === taskId && t.subtasks) {
                        return {
                            ...t,
                            subtasks: t.subtasks.map(st => st.id === subtaskId ? { ...st, done: !st.done } : st)
                        };
                    }
                    return t;
                });
                setTasks(updatedTasks);
                const updated = updatedTasks.find(t => t.id === taskId);
                if (updated) setSelectedTask(updated);
            };

            const handleCreateTask = (newTask) => {
                setTasks([...tasks, newTask]);
            };

            return (
                <div className="flex h-screen bg-slate-950 text-white">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 border-r border-slate-700 p-6 flex flex-col">
                        <h1 className="text-2xl font-bold mb-8 text-white">ProjectHub</h1>

                        <div className="mb-8">
                            <p className="text-sm text-gray-400 mb-3">Current Project</p>
                            <p className="text-lg font-semibold text-white">Website Redesign</p>
                        </div>

                        <div className="mb-8">
                            <p className="text-sm text-gray-400 mb-3">Views</p>
                            <div className="space-y-2">
                                {[
                                    { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
                                    { id: 'board', icon: 'board', label: 'Kanban Board' },
                                    { id: 'list', icon: 'list', label: 'Task List' },
                                    { id: 'timeline', icon: 'timeline', label: 'Timeline' }
                                ].map(view => (
                                    <button
                                        key={view.id}
                                        onClick={() => setCurrentView(view.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-2 rounded-lg transition ${
                                            currentView === view.id
                                                ? 'bg-blue-600 text-white'
                                                : 'text-gray-400 hover:bg-slate-800 hover:text-white'
                                        }`}
                                    >
                                        <Icon name={view.icon} size={18} />
                                        {view.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="mt-auto">
                            <p className="text-sm text-gray-400 mb-3">Team Members</p>
                            <div className="space-y-2">
                                {TEAM_MEMBERS.map(member => (
                                    <div key={member.id} className="flex items-center gap-3">
                                        <div className={`w-6 h-6 rounded-full ${member.color} flex items-center justify-center text-xs font-bold text-white`}>
                                            {member.initials}
                                        </div>
                                        <span className="text-sm text-gray-300">{member.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Top Bar */}
                        <div className="bg-slate-800 border-b border-slate-700 px-8 py-4 flex justify-between items-center">
                            <h2 className="text-2xl font-bold">
                                {currentView === 'dashboard' && 'Dashboard'}
                                {currentView === 'board' && 'Kanban Board'}
                                {currentView === 'list' && 'Task List'}
                                {currentView === 'timeline' && 'Timeline'}
                            </h2>
                            <button
                                onClick={() => setShowCreateModal(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition"
                            >
                                <Icon name="plus" size={18} />
                                New Task
                            </button>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-auto p-8">
                            {currentView === 'dashboard' && <DashboardView tasks={tasks} onTaskClick={setSelectedTask} />}
                            {currentView === 'board' && <KanbanView tasks={tasks} moveTask={moveTask} onTaskClick={setSelectedTask} />}
                            {currentView === 'list' && <ListView tasks={tasks} onTaskClick={setSelectedTask} onTasksChange={setTasks} />}
                            {currentView === 'timeline' && <TimelineView tasks={tasks} />}
                        </div>
                    </div>

                    {/* Modals */}
                    {selectedTask && (
                        <TaskModal
                            task={selectedTask}
                            onClose={() => setSelectedTask(null)}
                            onSave={() => {}}
                            onStatusChange={handleStatusChange}
                            onPriorityChange={handlePriorityChange}
                            onSubtaskToggle={handleSubtaskToggle}
                        />
                    )}
                    {showCreateModal && (
                        <CreateTaskModal
                            onClose={() => setShowCreateModal(false)}
                            onCreateTask={handleCreateTask}
                        />
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
