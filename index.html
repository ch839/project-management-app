        // ============ STORAGE ============
        function loadData(key, fallback) {
            try { var d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
            catch(e) { return fallback; }
        }
        function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        // ============ HELPERS ============
        function formatDate(d) {
            if (!d) return '';
            var date = new Date(d + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        function isSameDay(a, b) {
            return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
        }
        function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
        function getWeekStart(date) {
            var d = new Date(date);
            d.setDate(d.getDate() - d.getDay());
            return d;
        }
        function addDays(date, n) {
            var d = new Date(date);
            d.setDate(d.getDate() + n);
            return d;
        }
        function daysBetween(a, b) {
            return Math.round((b - a) / (1000 * 60 * 60 * 24));
        }
        function dateStr(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }
        function priorityColor(p) {
            return p === 'critical' ? '#ef4444' : p === 'high' ? '#f59e0b' : p === 'medium' ? '#3b82f6' : '#64748b';
        }
        function statusBadge(s) {
            var map = { 'done': ['Done','#10b981'], 'in-progress': ['In Progress','#3b82f6'], 'todo': ['To Do','#64748b'], 'active': ['Active','#8b5cf6'] };
            return map[s] || ['Unknown','#64748b'];
        }

            var [habitLog, setHabitLog] = useState(function() { return loadData('lifeos_habitlog', {}); });
            var [selectedDate, setSelectedDate] = useState(TODAY);
            var [calMonth, setCalMonth] = useState(TODAY.getMonth());
            var [calYear, setCalYear] = useState(TODAY.getFullYear());
            var [weekStart, setWeekStart] = useState(getWeekStart(TODAY));
            var [modal, setModal] = useState(null);
            var [editTask, setEditTask] = useState(null);
            var [kanbanGoalFilter, setKanbanGoalFilter] = useState('');
            var [selectedMindMapGoal, setSelectedMindMapGoal] = useState(goals.length > 0 ? goals[0].id : '');

            useEffect(function() { saveData('lifeos_goals', goals); }, [goals]);
            useEffect(function() { saveData('lifeos_habits', habits); }, [habits]);
            useEffect(function() { saveData('lifeos_habitlog', habitLog); }, [habitLog]);

            var allTasks = useMemo(function() {
                var tasks = [];
                goals.forEach(function(g) {
                    g.projects.forEach(function(p) {
                        p.tasks.forEach(function(t) {
                            tasks.push(Object.assign({}, t, {projectName: p.name, goalName: g.name, goalColor: g.color, goalEmoji: g.emoji, projectId: p.id}));
                        });
                    });
                });
                return tasks;
            }, [goals]);

            var todayTasks = allTasks.filter(function(t) { return t.due && isSameDay(new Date(t.due + 'T00:00:00'), selectedDate); });
            var upcomingTasks = allTasks.filter(function(t) {
                if (!t.due || t.status === 'done') return false;
                var d = new Date(t.due + 'T00:00:00');
                return d > TODAY && daysBetween(TODAY, d) <= 7;
            }).sort(function(a,b) { return new Date(a.due) - new Date(b.due); });

            function toggleHabit(habitId, date) {
                var key = habitId + '_' + dateStr(date);
                setHabitLog(function(prev) {
                    var next = Object.assign({}, prev);
                    next[key] = !prev[key];
                    return next;
                });
            }
            function isHabitDone(habitId, date) {
                return !!habitLog[habitId + '_' + dateStr(date)];
            }
            function getStreak(habitId) {
                var streak = 0;
                var d = new Date(TODAY);
                while (true) {
                    if (isHabitDone(habitId, d)) { streak++; d = addDays(d, -1); }
                    else break;
                }
                return streak;
            }

            function updateTaskStatus(taskId, newStatus) {
                setGoals(function(prev) {
                    return prev.map(function(g) {
                        return Object.assign({}, g, {
                            projects: g.projects.map(function(p) {
                                return Object.assign({}, p, {
                                    tasks: p.tasks.map(function(t) {
                                        return t.id === taskId ? Object.assign({}, t, {status: newStatus}) : t;
                                    })
                                });
                            })
                        });
                    });
                });
            }

            function addTask(projectId, task) {
                setGoals(function(prev) {
                    return prev.map(function(g) {
                        return Object.assign({}, g, {
                            projects: g.projects.map(function(p) {
                                if (p.id === projectId) {
                                    return Object.assign({}, p, {tasks: p.tasks.concat([Object.assign({}, task, {id: 't' + Date.now()})])});
                                }
                                return p;
                            })
                        });
                    });
                });
            }

            function addProject(goalId, projectName) {
                setGoals(function(prev) {
                    return prev.map(function(g) {
                        if (g.id === goalId) {
                            return Object.assign({}, g, {
                                projects: g.projects.concat([{id: 'p' + Date.now(), name: projectName, goalId: goalId, color: g.color, tasks: []}])
                            });
                        }
                        return g;
                    });
                });
            }

            function goalProgress(goal) {
                var total = 0, done = 0;
                goal.projects.forEach(function(p) { p.tasks.forEach(function(t) { total++; if (t.status === 'done') done++; }); });
                return total === 0 ? 0 : Math.round((done / total) * 100);

            // ============ TASK MODAL ============
            function TaskModal(props) {

                                <h3 className="text-xl font-bold">{task.title}</h3>

                            </div>

                            </div>
                            {task.due && <p className="text-sm text-slate-400 mb-3">Due: {formatDate(task.due)}</p>}
                            {task.notes && <p className="text-sm text-slate-300 mb-4 bg-slate-900.5 p-3 rounded">{task.nes}</p>}

                                  {task.status !== 'done' && <button onClick={function() { updateTaskStatus(task.id, 'done'); onClose(); }} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium">Mark Done</button>}
                                  {task.status !== 'in-progress' && task.status !== 'done' && <button onClick={function() { updateTaskStatus(task.id, 'in-progress'); onClose(); }} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Start</button>}
                                  {task.status === 'done' && <button onClick={function() { updateTaskStatus(task.id, 'todo'); onClose(); }} className="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded-lg text-sm font-medium">Reopen</button>}

                var [type, setType] = useState('task');
                var [notes, setNotes] = useState('');
                var allProjects = goals.flatMap(function(g) { return g.projects.map(function(p) { return Object.assign({}, p, {goalName: g.name, goalEmoji: g.emoji}); }); });
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className="bg-slate-800 rounded-xl p-6 max-w-lg w-full border border-slate-700 fade-in max-h-[90vh] overflow-auto" onClick={function(e) { e.stopPropagation(); }}>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold">New Task</h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">&times;</button>
                            </div>
                            <div className="space-y-3">
                                <input value={title} onChange={function(e){setTitle(e.target.value);}} placeholder="Task title..." className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
                                <select value={projectId} onChange={function(e){setProjectId(e.target.value);}} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm">
                                    <option value="">Select project...</option>
                                    {allProjects.map(function(p) { return <option key={p.id} value={p.id}>{p.goalEmoji} {p.goalName} 芒聙聰 {p.name}</option>; })}
                                </select>
                                <div className="flex gap-2">
                                    <input type="date" value={due} onChange={function(e){setDue(e.target.value);}} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
                                    <select value={priority} onChange={function(e){setPriority(e.target.value);}} className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm">
                                        <option value="low">Low</option>
                                        <option value="medium">Medium</option>
                                        <option value="high">High</option>
                                        <option value="critical">Critical</option>
                                    </select>
                                </div>
                                <textarea value={notes} onChange={function(e){setNotes(e.target.value);}} placeholder="Notes..." rows={3} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
                                <button onClick={function() { if (title && projectId) { addTask(projectId, {title: title, type: type, status:'todo', priority: priority, due: due || null, notes: notes}); onClose(); }}} className="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Add Task</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ============ ADD PROJECT MODAL ============
            function AddProjectModal(props) {
                var onClose = props.onClose;
                var [projectName, setProjectName] = useState('');
                var [selectedGoal, setSelectedGoal] = useState(props.goalId || goals[0].id);
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className="bg-slate-800 rounded-xl p-6 max-w-lg w-full border border-slate-700 fade-in" onClick={function(e) { e.stopPropagation(); }}>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold">New Project</h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">&times;</button>
                            </div>
                            <div className="space-y-3">
                                <input value={projectName} onChange={function(e){setProjectName(e.target.value);}} placeholder="Project name..." className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
                                <select value={selectedGoal} onChange={function(e){setSelectedGoal(e.target.value);}} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm">
                                    {goals.map(function(g) { return <option key={g.id} value={g.id}>{g.emoji} {g.name}</option>; })}
                                </select>
                                <button onClick={function() { if (projectName && selectedGoal) { addProject(selectedGoal, projectName); onClose(); }}} className="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Add Project</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ============ SIDEBAR ============
            function Sidebar() {
                return (
                    <div className="w-56 bg-slate-900/80 border-r border-slate-800 flex flex-col min-h-screen p-4 fixed left-0 top-0 bottom-0 z-30">
                        <h1 className="text-xl font-bold mb-1 text-blue-400">LifeOS</h1>
                        <p className="text-xs text-slate-500 mb-6">Personal Command Center</p>
                        <nav className="flex-1 space-y-1">
                            {viewsList.map(function(v) {
                                return (
                                    <button key={v.id} onClick={function() { setView(v.id); }}
                                        className={'w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition ' + (view === v.id ? 'bg-blue-600 text-white font-medium' : 'text-slate-400 hover:text-white hover:bg-slate-800')}>
                                        <span>{v.icon}</span> {v.label}
                                    </button>
                                );
                            })}
                        </nav>
                        <div className="pt-4 border-t border-slate-800 mt-4">
                            <p className="text-xs text-slate-500">{TODAY.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</p>
                        </div>
                    </div>
                );
            }

            // ============DDASHBOARD ============
            function Dashboard() {
                var habitsDoneToday = habits.filter(function(h) { return isHabitDone(h.id, TODAY); }).length;
                var inProgress = allTasks.filter(function(t) { return t.status === 'in-progress'; }).length;
                var totalDone = allTasks.filter(function(t) { return t.status === 'done'; }).length;
                var totalTasks = allTasks.length;

                var priorityData = ['critical','high','medium','low'].map(function(p) {
                    return {name: p.charAt(0).toUpperCase()+p.slice(1), count: allTasks.filter(function(t){return t.priority===p && t.status!=='done';}).length, fill: priorityColor(p)};
                });

                return (
                    <div className="space-y-6 fade-in">
                        <div className="flex justify-between items-center">
                            <div>
                                <h2 className="text-2xl font-bold">{'Good ' + (new Date().getHours() < 12 ? 'Morning' : new Date().getHours() < 17 ? 'Afternoon' : 'Evening') + ', Christian'}</h2>
                                <p className="text-slate-400 text-sm mt-1">Here is your day at a glance</p>
                            </div>
                            <button onClick={function() { setModal('addTask'); }} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">+ New Task</button>

                                { label: 'In Progress', value: inProgress, color: '#3b82f6' },
                                { label: 'Habits Today', value: habitsDoneToday + '/' + habits.length, color: '#8b5cf6' },
                                { label: 'Active Goals', value: goals.length, color: '#f59e0b' },
                            ].map(function(s, i) {
                                return (
                                    <div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
                                        <p className="text-xs text-slate-400 mb-1">{s.label}</p>
                                        <p className="text-2xl font-bold" style={{color: s.color}}>{s.value}</p>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="bg-slate-800/50 border border-slate-700.5 rounded-xl p-5">
                            <h3 className="font-semibold mb-4">Goal Progress</h3>
                            <div className="space-y-3">
                                {goals.map(function(g) {
                                    var pct = goalProgress(g);
                                    return (
                                        <div key={g.id}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span>{}.imoji} {g.name}</span>
                                                <span className="text-slate-400">{pct}%</span>
                                            </div>
                                            <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full rounded-full progress-bar" style={{width: pct + '%', background: g.color}} />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-slate-800/50 border border-slate-700.5 rounded-xl p-5">
                                <h3 className="font-semibold mb-3">Today's Habits</h3>
                                <div className="space-y-2">
                                    {habits.map(function(h) {
                                        return (
                                            <button key={h.id} onClick={function() { toggleHabit(h.id, TODAY); }}
                                                className={'w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-left transition ' + (isHabitDone(h.id, TODAY) ? 'bg-emerald-90/30 border border-emerald-700/30' : 'bg-slate-900/50 border border-slate-700/30 hover:border-slate-600')}>{t.status === 'done' && '芒聹聯Y聶卯>=</span>
                                                                            <span className={'flex-1 ' + (t.status === 'done' ? 'line-through text-slate-500'
